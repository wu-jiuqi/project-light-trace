main:
  push:
    - stages:
        - name: build-and-push-image
          script: |
            if ! command -v git-lfs >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                apt-get update && apt-get install -y git-lfs
              elif command -v apk >/dev/null 2>&1; then
                apk add --no-cache git-lfs
              else
                echo "git-lfs is required to fetch deploy/index.pck" >&2
                exit 1
              fi
            fi
            git lfs install --local
            git lfs pull
            pck_bytes="$(wc -c < deploy/index.pck)"
            if [ "$pck_bytes" -lt 1000000 ]; then
              echo "deploy/index.pck is only ${pck_bytes} bytes; Git LFS content was not fetched" >&2
              exit 1
            fi
            docker build -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest .
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest
      services:
        - docker

$:
  vscode:
    - if: $CNB_BRANCH == "main"
      runner:
        cpus: 16
      services:
        - docker
        - name: vscode
          options:
            onlyPreview: true
            launch: docker run -d --network host -e PORT=8686 -e CNB_API_ENDPOINT -e CNB_REPO_SLUG -e CNB_TOKEN docker.cnb.cool/liupeiquan/project-light-trace:latest
            keepAliveTimeout: 3600000
            daemon: true
    - if: $CNB_BRANCH == "dev"
      runner:
        cpus: 16
      services:
        - docker
        - vscode
