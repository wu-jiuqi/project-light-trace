<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">

		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}
		</style>
<style id="shuoguang-audio-gate-style">
#audio-start-gate {
	position: fixed;
	inset: 0;
	z-index: 20;
	display: flex;
	align-items: center;
	justify-content: center;
	background: #0d0d1f;
	color: #f4ead8;
	font-family: "Noto Serif SC", "Source Han Serif SC", "Microsoft YaHei", serif;
	cursor: pointer;
	user-select: none;
}

#audio-start-gate.hidden {
	display: none;
}

#audio-start-gate .audio-start-panel {
	display: flex;
	flex-direction: column;
	gap: 16px;
	align-items: center;
	padding: 28px 36px;
	border: 1px solid rgba(220, 186, 116, 0.5);
	background: rgba(16, 14, 28, 0.84);
	box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
}

#audio-start-gate .audio-start-title {
	font-size: 24px;
	line-height: 1.3;
}

#audio-start-gate .audio-start-hint {
	color: #c9bda6;
	font-size: 14px;
	line-height: 1.5;
}

#shuoguang-tv-video {
	position: fixed;
	z-index: 15;
	display: none;
	margin: 0;
	padding: 0;
	border: 0;
	background: #000;
	object-fit: fill;
	pointer-events: none;
}
</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
<style>body{margin:0;padding:0;background:#0d0d1f;overflow:hidden}canvas{display:block}</style>
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>
		<div id="audio-start-gate" role="button" tabindex="0" aria-disabled="false" aria-label="开始游戏">
			<div class="audio-start-panel">
				<div class="audio-start-title">点击开始游戏</div>
				<div class="audio-start-hint">浏览器需要一次操作来启用游戏声音</div>
			</div>
		</div>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":558991424,"index.wasm":37013224},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = true;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		const audioStartGate = document.getElementById('audio-start-gate');
		const audioStartTitle = audioStartGate?.querySelector('.audio-start-title');
		const audioStartHint = audioStartGate?.querySelector('.audio-start-hint');
		let gameStarted = false;
		let gameReady = false;
		let audioResumePending = false;

		function createNativeAudioBridge() {
			const SILENT_WAV = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
			const volumes = { master: 1, bgm: 1, sfx: 1, ambience: 1, voice: 1 };
			const bgm = new Audio();
			const voice = new Audio();
			const ambiences = new Map();
			const sfxPlayers = new Set();
			let unlocked = false;
			let unlockPromise = null;
			let bgmId = '';
			let bgmDb = 0;
			let bgmDuckDb = 0;

			bgm.preload = 'auto';
			voice.preload = 'auto';

			function clamp(value, min, max) {
				return Math.min(max, Math.max(min, value));
			}

			function dbToLinear(db) {
				return Math.pow(10, Number(db || 0) / 20);
			}

			function assetUrl(resourcePath) {
				const relative = String(resourcePath || '').replace(/^res:\/\//, '');
				return new URL(relative, document.baseURI).href;
			}

			function setPlayerVolume(player, channel, db, extraDb = 0) {
				player.__shuoguangChannel = channel;
				player.__shuoguangDb = Number(db || 0);
				player.__shuoguangExtraDb = Number(extraDb || 0);
				player.volume = clamp(
					volumes.master * volumes[channel] * dbToLinear(player.__shuoguangDb + player.__shuoguangExtraDb),
					0,
					1
				);
			}

			function refreshPlayerVolume(player) {
				setPlayerVolume(
					player,
					player.__shuoguangChannel || 'sfx',
					player.__shuoguangDb || 0,
					player.__shuoguangExtraDb || 0
				);
			}

			function handlePlaybackFailure(error) {
				unlocked = false;
				window.__shuoguangUserActivatedAudio = false;
				console.warn('[NativeAudio] playback failed:', error);
				if (gameReady) showAudioResumeGate('浏览器阻止了声音播放，请再次点击');
			}

			function safePlay(player) {
				const promise = player.play();
				if (promise && typeof promise.catch === 'function') {
					promise.catch(handlePlaybackFailure);
				}
			}

			function unlock() {
				if (unlocked) return Promise.resolve(true);
				if (unlockPromise) return unlockPromise;
				const primer = new Audio(SILENT_WAV);
				primer.volume = 0;
				unlockPromise = primer.play().then(() => {
					primer.pause();
					unlocked = true;
					window.__shuoguangUserActivatedAudio = true;
					console.info('[NativeAudio] browser media playback unlocked');
					return true;
				}).catch((error) => {
					handlePlaybackFailure(error);
					return false;
				}).finally(() => {
					unlockPromise = null;
				});
				return unlockPromise;
			}

			function stopPlayer(player) {
				player.pause();
				try { player.currentTime = 0; } catch (_) { /* Metadata may not be loaded yet. */ }
			}

			function handle(request) {
				if (!request || typeof request.method !== 'string') return false;
				switch (request.method) {
					case 'set_volumes':
						for (const key of Object.keys(volumes)) {
							if (request[key] != null) volumes[key] = clamp(Number(request[key]), 0, 1);
						}
						refreshPlayerVolume(bgm);
						refreshPlayerVolume(voice);
						for (const player of ambiences.values()) refreshPlayerVolume(player);
						for (const player of sfxPlayers) refreshPlayerVolume(player);
						return true;
					case 'play_bgm': {
						const url = assetUrl(request.path);
						if (bgmId !== request.id || bgm.src !== url) {
							stopPlayer(bgm);
							bgm.src = url;
							bgmId = String(request.id || request.path || '');
						}
						bgm.loop = request.loop !== false;
						bgmDb = Number(request.volume_db || 0);
						setPlayerVolume(bgm, 'bgm', bgmDb, bgmDuckDb);
						safePlay(bgm);
						return true;
					}
					case 'stop_bgm':
						stopPlayer(bgm);
						bgmId = '';
						return true;
					case 'duck_bgm':
						bgmDuckDb = Number(request.duck_db || 0);
						setPlayerVolume(bgm, 'bgm', bgmDb, bgmDuckDb);
						return true;
					case 'play_sfx': {
						const player = new Audio(assetUrl(request.path));
						player.preload = 'auto';
						setPlayerVolume(player, 'sfx', request.volume_db);
						sfxPlayers.add(player);
						player.addEventListener('ended', () => sfxPlayers.delete(player), { once: true });
						safePlay(player);
						return true;
					}
					case 'play_voice':
						stopPlayer(voice);
						voice.src = assetUrl(request.path);
						voice.loop = false;
						setPlayerVolume(voice, 'voice', request.volume_db);
						safePlay(voice);
						return true;
					case 'stop_voice':
						stopPlayer(voice);
						return true;
					case 'play_ambience': {
						let player = ambiences.get(request.id);
						if (!player) {
							player = new Audio();
							player.preload = 'auto';
							ambiences.set(request.id, player);
						}
						const url = assetUrl(request.path);
						if (player.src !== url) player.src = url;
						player.loop = request.loop !== false;
						setPlayerVolume(player, 'ambience', request.volume_db);
						safePlay(player);
						return true;
					}
					case 'stop_ambience': {
						const player = ambiences.get(request.id);
						if (player) stopPlayer(player);
						ambiences.delete(request.id);
						return true;
					}
					case 'stop_all':
						stopPlayer(bgm);
						stopPlayer(voice);
						for (const player of ambiences.values()) stopPlayer(player);
						for (const player of sfxPlayers) stopPlayer(player);
						ambiences.clear();
						sfxPlayers.clear();
						bgmId = '';
						return true;
				}
				return false;
			}

			function getDebugState() {
				return {
					unlocked,
					bgmId,
					bgmPaused: bgm.paused,
					bgmCurrentTime: bgm.currentTime,
					bgmReadyState: bgm.readyState,
					bgmSrc: bgm.currentSrc || bgm.src,
					bgmVolume: bgm.volume,
					bgmError: bgm.error ? { code: bgm.error.code, message: bgm.error.message } : null,
				};
			}

			return { handle, unlock, isUnlocked: () => unlocked, getDebugState };
		}

		const nativeAudio = createNativeAudioBridge();
		window.__shuoguangNativeAudio = nativeAudio;

		function getTvVideo() {
			let video = document.getElementById('shuoguang-tv-video');
			if (video) return video;
			video = document.createElement('video');
			video.id = 'shuoguang-tv-video';
			video.src = 'fragment-0001-tv.mp4';
			video.preload = 'metadata';
			video.playsInline = true;
			video.controls = false;
			document.body.appendChild(video);
			return video;
		}

		window.__shuoguangPlayTvVideo = function (x, y, width, height, viewportWidth, viewportHeight) {
			const canvas = document.getElementById('canvas');
			if (!canvas || viewportWidth <= 0 || viewportHeight <= 0) return;
			const canvasRect = canvas.getBoundingClientRect();
			const video = getTvVideo();
			video.style.left = (canvasRect.left + x * canvasRect.width / viewportWidth) + 'px';
			video.style.top = (canvasRect.top + y * canvasRect.height / viewportHeight) + 'px';
			video.style.width = (width * canvasRect.width / viewportWidth) + 'px';
			video.style.height = (height * canvasRect.height / viewportHeight) + 'px';
			video.style.display = 'block';
			video.style.pointerEvents = 'none';
			video.controls = false;
			video.muted = false;
			video.volume = 1;
			video.currentTime = 0;
			video.play().catch((error) => {
				console.warn('[TVVideo] autoplay with sound was rejected:', error);
				video.controls = true;
				video.style.pointerEvents = 'auto';
			});
		};

		window.__shuoguangStopTvVideo = function () {
			const video = document.getElementById('shuoguang-tv-video');
			if (!video) return;
			video.pause();
			video.style.display = 'none';
			video.controls = false;
			video.style.pointerEvents = 'none';
		};
		window.addEventListener('pagehide', window.__shuoguangStopTvVideo);

		function captureGodotAudioContext() {
			const NativeAudioContext = window.AudioContext || window.webkitAudioContext;
			if (!NativeAudioContext || NativeAudioContext.__shuoguangCaptureInstalled) {
				return;
			}
			function CapturedAudioContext(...args) {
				const context = new NativeAudioContext(...args);
				window.__godotAudioContext = context;
				context.addEventListener('statechange', () => {
					if (context.state === 'running') {
						window.__shuoguangUserActivatedAudio = true;
						return;
					}
					if (window.__shuoguangUserActivatedAudio) {
						window.__shuoguangUserActivatedAudio = false;
						if (gameReady) showAudioResumeGate('浏览器暂停了音频，请再次点击');
					}
				});
				console.info('[AudioGate] captured Godot AudioContext:', context.state);
				return context;
			}
			CapturedAudioContext.prototype = NativeAudioContext.prototype;
			Object.setPrototypeOf(CapturedAudioContext, NativeAudioContext);
			CapturedAudioContext.__shuoguangCaptureInstalled = true;
			window.AudioContext = CapturedAudioContext;
			if (window.webkitAudioContext === NativeAudioContext) {
				window.webkitAudioContext = CapturedAudioContext;
			}
		}

		function primeAudioContext(context) {
			const source = context.createBufferSource();
			source.buffer = context.createBuffer(1, 1, context.sampleRate);
			source.connect(context.destination);
			source.start(0);
			source.disconnect();
		}

		function showAudioResumeGate(hint) {
			audioStartGate?.classList.remove('hidden');
			audioStartGate?.setAttribute('aria-disabled', 'false');
			if (audioStartTitle) audioStartTitle.textContent = '点击启用声音';
			if (audioStartHint) audioStartHint.textContent = hint;
			audioStartGate?.focus();
		}

		function markAudioRunning(context) {
			window.__shuoguangUserActivatedAudio = true;
			audioStartGate?.classList.add('hidden');
			console.info('[AudioGate] Godot AudioContext running:', context.state);
			document.getElementById('canvas')?.focus();
		}

		function unlockGodotAudio() {
			nativeAudio.unlock();
			if (audioResumePending) return;
			const context = window.__godotAudioContext;
			if (!context || typeof context.resume !== 'function') {
				if (gameReady) showAudioResumeGate('音频尚未就绪，请再次点击');
				return;
			}
			if (context.state === 'running') {
				markAudioRunning(context);
				return;
			}
			audioResumePending = true;
			primeAudioContext(context);
			context.resume().then(() => {
				if (context.state !== 'running') {
					throw new Error('Godot AudioContext did not enter the running state.');
				}
				markAudioRunning(context);
			}).catch((err) => {
				console.warn('Unable to resume Godot WebAudio:', err);
				if (gameReady) showAudioResumeGate('声音启用失败，请再次点击');
			}).finally(() => {
				audioResumePending = false;
			});
		}

		function updateLoadProgress(current, total) {
			if (current > 0 && total > 0) {
				statusProgress.value = current;
				statusProgress.max = total;
			} else {
				statusProgress.removeAttribute('value');
				statusProgress.removeAttribute('max');
			}
		}

		function beginGameAfterAudioGesture() {
			nativeAudio.unlock();
			if (gameStarted) {
				unlockGodotAudio();
				return;
			}
			gameStarted = true;
			audioStartGate?.classList.add('hidden');
			audioStartGate?.setAttribute('aria-disabled', 'true');
			setStatusMode('progress');
			engine.startGame({ 'onProgress': updateLoadProgress }).then(() => {
				setStatusMode('hidden');
				gameReady = true;
				const context = window.__godotAudioContext;
				if (context?.state === 'running') {
					markAudioRunning(context);
				} else {
					// A sticky browser activation is often enough here. If it is not,
					// the gate is restored and the next click resumes the existing context.
					unlockGodotAudio();
					if (context?.state !== 'running') {
						showAudioResumeGate('浏览器需要再次点击来启用游戏声音');
					}
				}
			}, displayFailureNotice);
		}

		window.__shuoguangResumeGodotAudio = unlockGodotAudio;

		captureGodotAudioContext();
		if (audioStartGate) {
			audioStartGate.addEventListener('pointerdown', beginGameAfterAudioGesture);
			audioStartGate.addEventListener('keydown', (event) => {
				if (event.key === 'Enter' || event.key === ' ') {
					event.preventDefault();
					beginGameAfterAudioGesture();
				}
			});
			audioStartGate.focus();
		}
	}
}());
		</script>
